<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Agenda Médica{% endblock %}</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
            rel="stylesheet">

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">
    <link
      href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css"
      rel="stylesheet">
        <link
            href="{{ url_for('static', filename='css/agenda.css') }}"
            rel="stylesheet">
        <link
            href="{{ url_for('static', filename='images/logo.ico') }}"
            type="image/x-icon"
            rel="icon">
</head>

<body>

<div class="page-shell">
<div class="container app-container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} mt-3 app-alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    
    {% block scripts %}{% endblock %}
</div>
</div>
</body>
</html>
