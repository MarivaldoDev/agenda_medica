{% extends "base.html" %}

{% block content %}

<div class="agenda-shell">
    <div class="agenda-header">
        <div>
            <h2 class="agenda-title">Agenda Médica</h2>
            <p class="agenda-meta">Usuário ativo: <strong>{{ current_user.username }}</strong></p>
        </div>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-logout">
            Sair
        </a>
    </div>

    {% if error %}
    <div class="alert alert-danger app-alert">
        {{ error }}
    </div>
    {% elif not has_schedules %}
    <div class="alert alert-warning app-alert">
        Nenhum agendamento disponível no momento.
    </div>
    {% endif %}

    <div class="filter-panel">
        <div class="row g-3 align-items-center">
            <div class="col-md-4">
                <label for="filter-field" class="form-label small text-uppercase">Filtrar por</label>
                <select id="filter-field" class="form-select app-input">
                    <option value="patient">Paciente</option>
                    <option value="cpf">CPF</option>
                    <option value="doctor">Medico</option>
                    <option value="insurance">Convenio</option>
                    <option value="status">Status</option>
                </select>
            </div>

            <div class="col-md-8">
                <label for="filter-value" class="form-label small text-uppercase">Busca rápida</label>
                <input
                    id="filter-value"
                    class="form-control app-input"
                    type="text"
                    placeholder="Procure por qualquer campo"
                >
            </div>
        </div>
    </div>

    <div class="table-panel">
        <div id="schedule-table"></div>
    </div>
</div>

{% endblock %}


{% block scripts %}
<script>
    const schedules = {{ schedules | tojson }};
</script>

<script src="{{ url_for('static', filename='js/agenda.js') }}"></script>
{% endblock %}
